image: Visual Studio 2022
install:
- cmd: git submodule update --init --recursive
- ps: |
    Invoke-WebRequest 'https://dot.net/v1/dotnet-install.ps1' -OutFile "$env:TEMP\dotnet-install.ps1"
    & "$env:TEMP\dotnet-install.ps1" -Version 10.0.300 -InstallDir 'C:\Program Files\dotnet'
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- cmd: |
    dotnet restore Fody.sln
    dotnet build Fody.sln -c Release --no-restore
    dotnet restore Integration\Integration.sln
    dotnet build Integration\Integration.sln -c Release --no-restore
test: off
test_script:
- cmd: |
    dotnet test Fody.sln -c Release --no-build
    dotnet test Integration\Integration.sln -c Release --no-build
artifacts:
- path: nugets\*.nupkg
